<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penguin Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/script.js"></script>
</head>
<body class="splash-active">

  <!-- ══ 스플래시 화면 ══ -->
  <div id="splash">
    <div id="splash-bg">
      <img src="images/orora_2.png" alt="오로라 배경" />
    </div>
    <div id="splash-overlay"></div>

    <!-- 좌→우 스크롤 펭귄 -->
    <div id="splash-penguin-lr">
      <div class="sp-inner">
        <img src="images/section12.png" alt="걷는 펭귄" />
      </div>
    </div>

    <div id="splash-text">
      <p class="splash-sub">First Penguin Portfolio</p>
      <h1 class="splash-title">The Journey of<br>the Little Penguin</h1>
    </div>
    <p id="splash-hint">Scroll to Enter →</p>
  </div>

  <!-- ══ 고정 헤더 ══ -->
  <header class="header">
    <div class="logo">FIRST PENGUIN</div>
    <nav class="nav">
      <a href="#" onclick="scrollToSection(0); return false;">HOME</a>
      <a href="#" onclick="scrollToSection(5); return false;">ABOUT</a>
    </nav>
  </header>

  <!-- 가로 진행 표시바 -->
  <div id="h-progress-bar"></div>

  <!-- ══ 가로 스크롤 트랙 ══ -->
  <div id="h-track">
    <div id="h-stage">
      <div id="h-rail">

        <!-- 패널 0: 홈 – 오로라 -->
        <section class="h-section" id="home">
          <img class="bg-img" src="images/orora_2.png" alt="오로라 홈 배경" />
        </section>

        <!-- 패널 1: pp 이미지 -->
        <section class="h-section" id="pp-section">
          <img class="bg-img" src="images/pp.png" alt="프로필 배경" />
        </section>

        <!-- 패널 10: 엔딩 – 남극 오르막길 -->
        <section class="h-section" id="ending">
          <img class="bg-img" src="images/section14.png" alt="남극 오르막길 아기펭귄" />
        </section>

        <!-- 패널 11: 정상 -->
        <section class="h-section" id="summit">
          <img class="bg-img" src="images/section16.png" alt="정상에 오른 아기펭귄" />
        </section>

        <!-- 패널 12: 비디오 (마지막) -->
        <section class="h-section">
          <video class="bg-img" autoplay muted loop playsinline>
            <source src="vidieos/main.mp4" type="video/mp4" />
          </video>
        </section>

      </div><!-- /#h-rail -->
    </div><!-- /#h-stage -->
  </div><!-- /#h-track -->

  <!-- 눈 바닥선 -->
  <div id="ground"></div>

  <!-- 걷는 펭귄 캐릭터 -->
  <div id="penguin">
    <div class="p-inner">
      <img class="penguin-img penguin-young" src="images/section12.png" alt="어린 펭귄" />
      <img class="penguin-img penguin-adult" src="images/section17.png" alt="황제펭귄" />
    </div>
  </div>

</body>
</html>
